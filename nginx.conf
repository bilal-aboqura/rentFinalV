# Nginx configuration for the Airport Transfer and Driver Booking System.
#
# Production deployment:
#   sudo cp nginx.conf /etc/nginx/sites-available/airport-transfers
#   sudo ln -s /etc/nginx/sites-available/airport-transfers /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d transfers.example.com
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name transfers.example.com;

    # ACME challenge passthrough for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy + static frontend
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name transfers.example.com;

    # --- TLS settings ---
    ssl_certificate     /etc/letsencrypt/live/transfers.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transfers.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Frontend static assets (Vite build) ---
    root /var/www/airport-transfers;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xml+rss image/svg+xml;

    # Reverse proxy API requests to the PM2 backend (never expose port 5000 directly)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Static file caching
    location ~* \.(?:css|js|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
