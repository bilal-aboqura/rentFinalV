# Nginx configuration for the Airport Transfer and Driver Booking System.
# - Serves the built Vite frontend as static assets.
# - Reverse-proxies /api/* to the Node.js backend running under PM2.
# - Terminates TLS (use Certbot / Let's Encrypt to provision certificates).

# Rate limiting zone for the public API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name airporttransfers.example.com;

    # ACME challenge passthrough (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name airporttransfers.example.com;

    # ---- TLS configuration ----
    ssl_certificate     /etc/letsencrypt/live/airporttransfers.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/airporttransfers.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Gzip for text-based assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ---- API reverse proxy -> PM2 backend ----
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ---- Frontend static assets (Vite build output) ----
    root /var/www/airport-transfers/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable hashed assets aggressively
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
